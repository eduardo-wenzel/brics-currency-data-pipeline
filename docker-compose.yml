services:
  postgres:
    image: postgres:16-alpine
    container_name: brics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-brics_pipeline}
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-brics_pipeline}"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brics-pipeline-app
    restart: on-failure
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os,socket; s=socket.create_connection((os.getenv('PG_HOST','postgres'), int(os.getenv('PG_PORT','5432'))), 2); s.close()\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    command: ["python", "pipeline/run.py"]

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: brics-pgadmin
    restart: unless-stopped
    profiles: ["admin"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@bricspipeline.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
