[tool.black]
line-length = 100
target-version = ["py311"]
extend-exclude = '''
/(\.conda|\.pytest_cache|\.pytest_tmp|data/pytest_tmp|\.ruff_cache)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [
    ".conda",
    ".pytest_cache",
    ".pytest_tmp",
    ".ruff_cache",
    "data/pytest_tmp",
    "notebooks/*.ipynb",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q -p no:cacheprovider"
