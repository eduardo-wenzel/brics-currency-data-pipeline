name: BRICS Currency Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      API_URL: ${{ secrets.API_URL }}
      CURRENCIES: ${{ secrets.CURRENCIES }}
      SKIP_DB_LOAD: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python src/pipeline.py

      - name: Slack notification
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ job.status }}"
          COLOR="#2eb886"
          if [ "$STATUS" != "success" ]; then COLOR="#d40e0e"; fi
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"attachments\":[{\"color\":\"$COLOR\",\"text\":\"BRICS pipeline: $STATUS\nRepo: ${{ github.repository }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}]}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Email notification
        if: ${{ always() && secrets.EMAIL_SMTP_SERVER != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.EMAIL_SMTP_SERVER }}
          server_port: ${{ secrets.EMAIL_SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: BRICS pipeline ${{ job.status }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_FROM }}
          body: |
            BRICS pipeline status: ${{ job.status }}
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
